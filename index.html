<!DOCTYPE html>
<html lang="en">
<head>

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;overflow-x:hidden}
body{
  display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
  min-height:100vh;
  padding:16px 8px 30px;
  background:#f2f0ed;
  font-family:'Lato',sans-serif;
}
#scene{
  position:relative;
  width:100%;
  max-width:520px;
}
#scene svg{
  width:100%;
  height:auto;
  display:block;
  overflow:visible;
}
#bouquet{animation:sway 6s ease-in-out infinite;transform-origin:260px 620px}
@keyframes sway{0%,100%{transform:rotate(-0.8deg)}50%{transform:rotate(0.8deg)}}
.spark{position:absolute;border-radius:50%;pointer-events:none;animation:floatUp linear forwards}
@keyframes floatUp{from{opacity:0;transform:translateY(0)}20%{opacity:.85}to{opacity:0;transform:translateY(-180px)}}
#msg-wrap{
  margin-top:14px;text-align:center;min-height:48px;
  padding:0 12px;
  width:100%;max-width:520px;
}
#msg .word{display:inline-block;opacity:0;transform:translateY(5px);animation:wordIn .45s ease forwards}
@keyframes wordIn{to{opacity:1;transform:translateY(0)}}
#msg{
  font-family:'Lato',sans-serif;
  font-size:clamp(14px, 4vw, 19px);
  font-weight:300;color:#5a3a00;letter-spacing:.2px;
  line-height:1.5;
  color: white;
}
#sub{
  font-family:'Lato',sans-serif;
  font-size:clamp(10px, 2.5vw, 12px);
  font-weight:300;color:#9a7030;letter-spacing:1.8px;
  margin-top:5px;text-transform:uppercase;
  opacity:0;transition:opacity 1.2s;
}
#photos-row{
  display:flex;gap:clamp(6px,2vw,10px);
  justify-content:center;
  flex-wrap:wrap;
  margin-top:14px;
  padding:0 8px;
  width:100%;max-width:520px;
  opacity:0;transition:opacity 1.4s;
}
#photos-row.show{opacity:1}
.photo-circle{
  width:clamp(48px,11vw,62px);
  height:clamp(48px,11vw,62px);
  border-radius:50%;
  border:2.5px solid #c8a060;
  object-fit:cover;
  object-position:center top;
  box-shadow:0 2px 8px rgba(90,50,0,0.18);
  -webkit-transition:transform .25s;
  transition:transform .25s;
  cursor:default;
  display:block;
  /* iOS image rendering fix */
  -webkit-backface-visibility:hidden;
  backface-visibility:hidden;
}
@media(hover:hover){.photo-circle:hover{transform:scale(1.1);}}
</style>
</head>

<script>
(function(){
var NS='http://www.w3.org/2000/svg';
function svgEl(tag,attrs){
  var e=document.createElementNS(NS,tag);
  for(var k in attrs) e.setAttribute(k,attrs[k]);
  return e;
}
function drawSunflower(parent,cx,cy,petalLen,petalW,diskR,petGrad,diskGrad,petalCount){
  var g=svgEl('g',{filter:'url(#fShadow)'});
  var outer=svgEl('g',{opacity:'0.92',filter:'url(#petalShadow)'});
  for(var i=0;i<petalCount;i++){
    var angle=(360/petalCount)*i;
    outer.appendChild(svgEl('ellipse',{cx:cx,cy:cy-(diskR+petalLen*0.42),rx:petalW,ry:petalLen*0.58,fill:'url(#'+petGrad+')',transform:'rotate('+angle+' '+cx+' '+cy+')'}));
  }
  g.appendChild(outer);
  var inner=svgEl('g',{opacity:'0.85'});
  for(var i=0;i<petalCount;i++){
    var angle=(360/petalCount)*i+(360/petalCount/2);
    inner.appendChild(svgEl('ellipse',{cx:cx,cy:cy-(diskR+petalLen*0.28),rx:petalW*0.75,ry:petalLen*0.42,fill:'url(#pet2)',transform:'rotate('+angle+' '+cx+' '+cy+')'}));
  }
  g.appendChild(inner);
  g.appendChild(svgEl('circle',{cx:cx,cy:cy,r:diskR,fill:'url(#'+diskGrad+')',filter:'url(#diskFilter)'}));
  var r1=diskR*0.78,n1=Math.round(2*Math.PI*r1/5);
  for(var i=0;i<n1;i++){var a=(2*Math.PI/n1)*i;g.appendChild(svgEl('circle',{cx:cx+Math.cos(a)*r1,cy:cy+Math.sin(a)*r1,r:diskR*0.075,fill:'#5a3010',opacity:'.85'}));}
  var r2=diskR*0.54,n2=Math.round(2*Math.PI*r2/5);
  for(var i=0;i<n2;i++){var a=(2*Math.PI/n2)*i+0.3;g.appendChild(svgEl('circle',{cx:cx+Math.cos(a)*r2,cy:cy+Math.sin(a)*r2,r:diskR*0.07,fill:'#3a1e08',opacity:'.9'}));}
  var r3=diskR*0.3,n3=Math.round(2*Math.PI*r3/5);
  for(var i=0;i<n3;i++){var a=(2*Math.PI/n3)*i+0.6;g.appendChild(svgEl('circle',{cx:cx+Math.cos(a)*r3,cy:cy+Math.sin(a)*r3,r:diskR*0.075,fill:'#2a1205',opacity:'.95'}));}
  g.appendChild(svgEl('circle',{cx:cx,cy:cy,r:diskR*0.1,fill:'#180800',opacity:'.9'}));
  g.appendChild(svgEl('ellipse',{cx:cx-diskR*0.25,cy:cy-diskR*0.28,rx:diskR*0.22,ry:diskR*0.14,fill:'#7a4820',opacity:'.3',transform:'rotate(-30 '+(cx-diskR*0.25)+' '+(cy-diskR*0.28)+')'}));
  parent.appendChild(g);
}
  var fg=document.getElementById('flowerGroup');
  drawSunflower(fg,175,210,56,11,28,'pet2','diskSm',22);
  drawSunflower(fg,260,175,62,12,31,'pet3','disk',22);
  drawSunflower(fg,345,210,56,11,28,'pet1','diskSm',22);
  drawSunflower(fg,130,295,58,11,30,'pet1','disk',22);
  drawSunflower(fg,210,265,60,11,30,'pet2','diskSm',22);
  drawSunflower(fg,310,265,60,12,30,'pet3','disk',22);
  drawSunflower(fg,390,295,58,11,29,'pet1','diskSm',22);
  drawSunflower(fg,185,355,64,12,33,'pet3','disk',24);
  drawSunflower(fg,270,340,68,13,35,'pet1','diskSm',24);
  drawSunflower(fg,355,355,64,12,33,'pet2','disk',24);

var msg=document.getElementById('msg');
var sub=document.getElementById('sub');
var photosRow=document.getElementById('photos-row');
var text='🌻 Congratulations Angelyn for your new job!';
var words=text.split(' ');

words.forEach(function(word,i){
  var span=document.createElement('span');
  span.className='word';
  span.textContent=word+'\u00A0';
  span.style.animationDelay=(800+i*170)+'ms';
  msg.appendChild(span);
});

var delay=800+words.length*170+600;
setTimeout(function(){sub.style.opacity='1';},delay);
setTimeout(function(){photosRow.classList.add('show');},delay+500);

var scene=document.getElementById('scene');
var sparkColors=['#ffd54f','#ffe082','#ffca28','#fff176','#ffb300'];
function spark(){
  var s=document.createElement('div');
  s.className='spark';
  var sz=3+Math.random()*5;
  var sceneW=scene.offsetWidth;
  var sceneH=scene.offsetHeight;
  s.style.cssText='width:'+sz+'px;height:'+sz+'px;left:'+(sceneW*0.08+Math.random()*sceneW*0.84)+'px;top:'+(30+Math.random()*sceneH*0.78)+'px;background:'+sparkColors[Math.floor(Math.random()*sparkColors.length)]+';animation-duration:'+(3+Math.random()*3.5)+'s;box-shadow:0 0 '+(sz*2)+'px #ffd54f;';
  scene.appendChild(s);
  setTimeout(function(){if(s.parentNode)s.parentNode.removeChild(s);},6500);
}
setInterval(spark,320);

})();
</script>

</html>
